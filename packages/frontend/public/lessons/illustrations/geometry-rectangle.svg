<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="Chu vi hình chữ nhật P bằng 2 nhân tổng a cộng b">
  <rect width="320" height="220" fill="#ecfeff"/>
  <rect x="70" y="50" width="180" height="110" rx="8" fill="#cffafe" stroke="#0891b2" stroke-width="3"/>
  <text x="160" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0e7490">chiều dài a</text>
  <text x="48" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0e7490" transform="rotate(-90 48 110)">chiều rộng b</text>
  <text x="160" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-style="italic" fill="#155e75">P = 2(a + b)</text>
</svg>
