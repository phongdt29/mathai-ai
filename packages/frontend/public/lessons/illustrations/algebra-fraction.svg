<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="Phân thức đại số A trên B với B khác 0">
  <rect width="320" height="220" fill="#eff6ff"/>
  <rect x="24" y="24" width="272" height="172" rx="16" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="160" y="82" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-style="italic" fill="#1d4ed8">A</text>
  <line x1="110" y1="98" x2="210" y2="98" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
  <text x="160" y="140" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-style="italic" fill="#1e40af">B</text>
  <text x="250" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1e40af">(B ≠ 0)</text>
  <text x="160" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">Rút gọn bằng nhân tử chung</text>
</svg>
